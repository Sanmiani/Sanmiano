<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strong After 35 — WAAPI Sample</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1080px;
      height: 1350px;
      background: #0d1117;
      font-family: 'Georgia', serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .frame {
      width: 1080px;
      height: 1350px;
      background: linear-gradient(160deg, #0d1117 0%, #1a2332 60%, #0d1117 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 90px;
      position: relative;
    }

    /* Decorative gold line */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 8px;
      background: linear-gradient(90deg, #c9a84c, #f0d080, #c9a84c);
    }

    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 8px;
      background: linear-gradient(90deg, #c9a84c, #f0d080, #c9a84c);
    }

    /* Brand tag */
    .brand-tag {
      font-family: 'Arial', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 6px;
      color: #c9a84c;
      text-transform: uppercase;
      margin-bottom: 60px;
      opacity: 0;
    }

    /* Main headline */
    .headline {
      font-size: 88px;
      font-weight: 900;
      color: #ffffff;
      text-align: center;
      line-height: 1.05;
      text-transform: uppercase;
      letter-spacing: -1px;
      margin-bottom: 20px;
      opacity: 0;
    }

    .headline .highlight {
      color: #c9a84c;
    }

    /* Stat callout */
    .stat-box {
      background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
      border: 2px solid rgba(201,168,76,0.4);
      border-radius: 16px;
      padding: 36px 50px;
      margin: 50px 0;
      text-align: center;
      opacity: 0;
      width: 100%;
    }

    .stat-number {
      font-size: 96px;
      font-weight: 900;
      color: #c9a84c;
      line-height: 1;
    }

    .stat-label {
      font-family: 'Arial', sans-serif;
      font-size: 32px;
      color: #a0b4c8;
      margin-top: 10px;
      line-height: 1.3;
    }

    /* Checklist items */
    .checklist {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 28px;
      margin-bottom: 60px;
    }

    .check-item {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      opacity: 0;
    }

    .check-icon {
      font-size: 38px;
      line-height: 1.2;
      flex-shrink: 0;
    }

    .check-text {
      font-family: 'Arial', sans-serif;
      font-size: 34px;
      color: #e8eef4;
      line-height: 1.4;
    }

    .check-text strong {
      color: #ffffff;
      font-weight: 700;
    }

    /* CTA */
    .cta {
      font-family: 'Arial', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: #4ade80;
      text-align: center;
      opacity: 0;
      letter-spacing: 1px;
    }

    .cta .arrow {
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="top-bar"></div>

    <div class="brand-tag">@Strongafter35afrimen</div>

    <h1 class="headline">
      Know Your<br /><span class="highlight">Heart</span><br />Numbers
    </h1>

    <div class="stat-box">
      <div class="stat-number">30%</div>
      <div class="stat-label">Higher heart disease risk<br />for African men vs other groups</div>
    </div>

    <div class="checklist">
      <div class="check-item" id="check1">
        <span class="check-icon">✅</span>
        <span class="check-text"><strong>Blood pressure</strong> — target under 130/80</span>
      </div>
      <div class="check-item" id="check2">
        <span class="check-icon">✅</span>
        <span class="check-text"><strong>LDL cholesterol</strong> — target under 100</span>
      </div>
      <div class="check-item" id="check3">
        <span class="check-icon">✅</span>
        <span class="check-text"><strong>Blood sugar</strong> — check annually after 35</span>
      </div>
    </div>

    <div class="cta">
      Tag a brother who needs to see this 💪
    </div>

    <div class="bottom-bar"></div>
  </div>

  <script>
    // WAAPI contract: create all animations synchronously, then pause.
    // HyperFrames adapter will seek currentTime to drive playback.

    function animate(el, keyframes, options) {
      const anim = el.animate(keyframes, {
        ...options,
        fill: "both",
        iterations: 1,
      });
      anim.pause();
      return anim;
    }

    // 1 — Brand tag slides down from above
    animate(
      document.querySelector(".brand-tag"),
      [
        { opacity: 0, transform: "translateY(-30px)" },
        { opacity: 1, transform: "translateY(0)" },
      ],
      { duration: 600, delay: 0, easing: "ease-out" }
    );

    // 2 — Headline fades up
    animate(
      document.querySelector(".headline"),
      [
        { opacity: 0, transform: "translateY(40px)" },
        { opacity: 1, transform: "translateY(0)" },
      ],
      { duration: 700, delay: 400, easing: "ease-out" }
    );

    // 3 — Stat box scales in
    animate(
      document.querySelector(".stat-box"),
      [
        { opacity: 0, transform: "scale(0.85)" },
        { opacity: 1, transform: "scale(1)" },
      ],
      { duration: 600, delay: 900, easing: "cubic-bezier(0.34,1.56,0.64,1)" }
    );

    // 4 — Checklist items stagger in from left
    document.querySelectorAll(".check-item").forEach((el, i) => {
      animate(
        el,
        [
          { opacity: 0, transform: "translateX(-40px)" },
          { opacity: 1, transform: "translateX(0)" },
        ],
        { duration: 500, delay: 1400 + i * 200, easing: "ease-out" }
      );
    });

    // 5 — CTA pulses in
    animate(
      document.querySelector(".cta"),
      [
        { opacity: 0, transform: "scale(0.9)" },
        { opacity: 1, transform: "scale(1.05)" },
        { opacity: 1, transform: "scale(1)" },
      ],
      { duration: 600, delay: 2300, easing: "ease-out" }
    );
  </script>
</body>
</html>
